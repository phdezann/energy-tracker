[versions]
guava = "33.2.1-jre"
commons-io = "2.18.0"
jackson = "2.15.2"
functions-framework-api = "1.1.4"
functions-framework = "1.3.3"

[libraries]
guava = { module = "com.google.guava:guava", version.ref = "guava" }
commonsIo = { module = "commons-io:commons-io", version.ref = "commons-io" }
jackson = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
functionsFrameworkApi = { module = "com.google.cloud.functions:functions-framework-api", version.ref = "functions-framework-api" }
functionsFramework = { module = "com.google.cloud.functions.invoker:java-function-invoker", version.ref = "functions-framework" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version = "2.0.20" }